# Sends yesterday's golf recap image to Telegram.
# Add TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID under repo Settings → Secrets and variables → Actions (Repository secrets).
# Optional: change RECAP_GOLF_MODE below to majors | hard | masters.

name: Daily golf recap

on:
  schedule:
    # ~8:00 America/Chicago (14:00 UTC); CDT is 7h behind UTC so summer is 1h earlier local — adjust if needed.
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install system deps for Puppeteer (Chromium)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation \
            libasound2 libatk-bridge2.0-0 libatk1.0-0 libcairo2 libcups2 \
            libdbus-1-3 libdrm2 libgbm1 libglib2.0-0 libgtk-3-0 libnspr4 libnss3 \
            libpango-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxdamage1 \
            libxext6 libxfixes3 libxkbcommon0 libxrandr2

      - run: npm ci

      - name: Generate recap and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RECAP_GOLF_MODE: majors
        run: npm run recap
